version: "3"

# テンプレート開発用の設定です。
#
# 【背景】
# Docker 環境では APP_ENV が環境変数として設定されているため、EC-CUBE は .env を読み込みません。
# そのため管理画面からテンプレートを切り替えても反映されません。
# このファイルで ECCUBE_TEMPLATE_CODE を環境変数として設定することで切り替えを可能にします。
#
# 【ECCUBE_TEMPLATE_CODE の設定方法】
# プロジェクトルートの .env ファイルに以下を追記してください（git管理対象外）。
#   ECCUBE_TEMPLATE_CODE=your_template_code
#
# 【起動方法】
# docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.template.yml up -d
#
# 【テンプレートの切り替え方法】
# 1. .env の ECCUBE_TEMPLATE_CODE を変更する
# 2. docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.template.yml up -d
#    ※ restart ではなく up -d が必要です（restart は環境変数の変更を反映しません）

services:
  ec-cube:
    environment:
      # .env の ECCUBE_TEMPLATE_CODE を参照します。未設定の場合は "default" を使用します。
      ECCUBE_TEMPLATE_CODE: "${ECCUBE_TEMPLATE_CODE:-default}"
    volumes:
      - "./app/template:/var/www/html/app/template"
      - "./html/template:/var/www/html/html/template"
      - "./html/user_data:/var/www/html/html/user_data"
