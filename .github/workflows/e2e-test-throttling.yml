name: E2E test(Throttoling) for EC-CUBE

on:
  workflow_call:

permissions:
  contents: read

jobs:
  codeception:
    name: Codeception
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: [ 8.3 ]
        db: [ pgsql ]
        method: [ フロント画面ログイン_IP, フロント画面ログイン_会員, 管理画面ログイン_IP, 管理画面ログイン_会員, 会員登録, 問い合わせ, パスワード再発行, 注文確認_非会員購入, 注文確認_会員購入, 注文完了_非会員購入, 注文完了_会員購入, 会員情報編集, 配送先情報_追加, 配送先情報_編集, 配送先情報_削除, order_お届け先追加, order_お届け先変更, 新規会員登録_入力, 管理画面二段階認証 ]
        include:
          - db: pgsql
            database_url: postgres://postgres:password@127.0.0.1:5432/eccube_db
            database_server_version: 14
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      mailcatcher:
        image: schickling/mailcatcher
        ports:
          - 1080:1080
          - 1025:1025

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      # ShoppingController::checkoutをテストするため、confirmの上限値を変更する
      - name: Fix limiter limit
        if: startsWith(matrix.method, '注文完了')
        run: |
          echo "eccube:
              rate_limiter:
                  shopping_confirm_ip:
                      route: ~
                      limit: 1024
                      interval: '30 minutes'
                  shopping_confirm_customer:
                      route: ~
                      limit: 1024
                      interval: '30 minutes'
                  shopping_checkout_ip:
                      route: ~
                      limit: 25
                      interval: '30 minutes'
                  shopping_checkout_customer:
                      route: ~
                      limit: 10
                      interval: '30 minutes'" > app/config/eccube/packages/prod/eccube_rate_limiter.yaml

      # delivery deleteのテストするため、delivery addの上限値を変更する
      - name: Fix limiter limi for delivery delete
        if: startsWith(matrix.method, '配送先情報_削除')
        run: |
          echo "eccube:
              rate_limiter:
                  mypage_delivery_new:
                      route: mypage_delivery_new
                      method: [ 'POST' ]
                      type: customer
                      limit: 1024
                      interval: '30 minutes'
                  mypage_delivery_delete:
                      route: mypage_delivery_delete
                      method: [ 'DELETE' ]
                      type: customer
                      limit: 10
                      interval: '30 minutes'" > app/config/eccube/packages/prod/eccube_rate_limiter.yaml

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: ${{ matrix.php }}

      - name: Initialize Composer
        uses: ./.github/actions/composer

      - name: Cache npm dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache build artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        id: build-cache
        with:
          path: |
            html/template/**/css
            html/bundle
          key: ${{ runner.os }}-build-${{ hashFiles('html/template/**/scss/**/*.scss', 'html/template/**/js/**/*.js', 'package-lock.json', 'gulpfile.js', 'webpack.config.js', 'gulp/**/*.js') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build Sass and JavaScript
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          npm ci
          npm run build

      - name: Setup to EC-CUBE
        env:
          APP_ENV: 'prod'
          DATABASE_URL: ${{ matrix.database_url }}
          DATABASE_SERVER_VERSION: ${{ matrix.database_server_version }}
        run: |
          echo "APP_ENV=${APP_ENV}" > .env
          echo "TRUSTED_HOSTS=127.0.0.1,localhost" >> .env
          bin/console doctrine:database:create --env=dev
          bin/console doctrine:schema:create --env=dev
          bin/console eccube:fixtures:load --env=dev

      - name: Cache chromedriver
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        id: chromedriver-cache
        with:
          path: /usr/local/bin/chromedriver
          key: ${{ runner.os }}-chromedriver-${{ hashFiles('.github/workflows/e2e-test-throttling.yml') }}
          restore-keys: |
            ${{ runner.os }}-chromedriver-

      - name: setup-chromedriver
        if: steps.chromedriver-cache.outputs.cache-hit != 'true'
        uses: nanasess/setup-chromedriver@5c1220e385aca82610aa6fc7cdf1429306d50f9d  # master

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05  # latest
        with:
          packages: fonts-ipafont fonts-ipaexfont
          version: 1.0

      - name: Run chromedriver
        run: |
          export DISPLAY=:99
          chromedriver --url-base=/wd/hub --port=9515 &
          echo ">>> Started chrome-driver"
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 > /dev/null 2>&1 &
          echo ">>> Started xvfb"

      - name: Start PHP Development Server
        env:
          APP_ENV: 'prod'
          DATABASE_URL: ${{ matrix.database_url }}
          DATABASE_SERVER_VERSION: ${{ matrix.database_server_version }}
          MAILER_DSN: 'smtp://127.0.0.1:1025'
          ECCUBE_PACKAGE_API_URL: 'http://127.0.0.1:8080'
        run: php -S 127.0.0.1:8000 codeception/router.php &

      - name: Codeception
        uses: nick-invision/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 40
          max_attempts: 2
          retry_on: error
          command: |
            sed -i "s|%GITHUB_WORKSPACE%|${GITHUB_WORKSPACE}|g" codeception/_envs/github_action.yml
            vendor/bin/codecept -vvv run acceptance --env chrome,github_action EF09ThrottlingCest::${METHOD} --html report.html
        env:
          APP_ENV: 'prod'
          DATABASE_URL: ${{ matrix.database_url }}
          DATABASE_SERVER_VERSION: ${{ matrix.database_server_version }}
          MAILER_DSN: 'smtp://127.0.0.1:1025'
          ECCUBE_PACKAGE_API_URL: 'http://127.0.0.1:8080'
          METHOD: ${{ matrix.method }}
          SYMFONY_DEPRECATIONS_HELPER: weak

      - name: Upload evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: codeception-${{ matrix.method }}-evidence
          path: codeception/_output/
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: codeception-${{ matrix.method }}-logs
          path: var/log/
