name: E2E test for EC-CUBE

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright (${{ matrix.suite }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php: [ 8.3 ]
        db: [ pgsql ]
        suite:
          - admin-top
          - admin-auth
          - admin-product
          - admin-order
          - admin-shipping
          - admin-customer
          - admin-contents
          - admin-basicinfo
          - admin-system
          - front-top
          - front-product
          - front-customer
          - front-other
        include:
          - db: pgsql
            database_url: postgres://postgres:password@127.0.0.1:5432/eccube_db
            database_server_version: 14
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      mailcatcher:
        image: schickling/mailcatcher
        ports:
          - 1080:1080
          - 1025:1025

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: ${{ matrix.php }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20

      - name: Initialize Composer
        uses: ./.github/actions/composer

      - name: Cache npm dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache build artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        id: build-cache
        with:
          path: |
            html/template/**/css
            html/bundle
          key: ${{ runner.os }}-build-${{ hashFiles('html/template/**/scss/**/*.scss', 'html/template/**/js/**/*.js', 'package-lock.json', 'gulpfile.js', 'webpack.config.js', 'gulp/**/*.js') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build Sass and JavaScript
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          npm ci
          npm run build

      - name: Setup to EC-CUBE
        env:
          APP_ENV: 'codeception'
          DATABASE_URL: ${{ matrix.database_url }}
          DATABASE_SERVER_VERSION: ${{ matrix.database_server_version }}
        run: |
          echo "APP_ENV=${APP_ENV}" > .env
          echo "TRUSTED_HOSTS=127.0.0.1,localhost" >> .env
          bin/console doctrine:database:create --env=dev
          bin/console doctrine:schema:create --env=dev
          bin/console eccube:fixtures:load --env=dev

      - name: Install Playwright dependencies
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: e2e
        run: npx playwright install-deps chromium

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05  # latest
        with:
          packages: fonts-ipafont fonts-ipaexfont
          version: 1.0

      - name: Start PHP Development Server
        env:
          APP_ENV: 'codeception'
          DATABASE_URL: ${{ matrix.database_url }}
          DATABASE_SERVER_VERSION: ${{ matrix.database_server_version }}
          MAILER_DSN: 'smtp://127.0.0.1:1025'
          ECCUBE_PACKAGE_API_URL: 'http://127.0.0.1:8080'
        run: php -S 127.0.0.1:8000 codeception/router.php &

      - name: Determine Playwright project
        id: project
        run: |
          SUITE="${{ matrix.suite }}"
          if [[ "$SUITE" == admin-* ]]; then
            echo "project=admin-tests" >> $GITHUB_OUTPUT
          elif [[ "$SUITE" == front-* ]]; then
            echo "project=front-tests" >> $GITHUB_OUTPUT
          fi

      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: 'http://127.0.0.1:8000'
          DATABASE_URL: ${{ matrix.database_url }}
          ECCUBE_ADMIN_ROUTE: 'admin'
          ADMIN_USER: 'admin'
          ADMIN_PASSWORD: 'password'
          APP_ENV: 'codeception'
          CI: 'true'
        run: |
          npx playwright test --project=setup --project=${{ steps.project.outputs.project }} ${{ matrix.suite }}.spec.ts

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-${{ matrix.suite }}-report
          path: e2e/playwright-report/

      - name: Upload ScreenShots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-${{ matrix.suite }}-results
          path: e2e/test-results/

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-${{ matrix.suite }}-logs
          path: var/log/
