name: Plugin test for EC-CUBE

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plugin-install:
    name: Plugin install
    runs-on: ${{ matrix.operating-system }}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ ubuntu-24.04 ]
        php: [ '8.1' ]
        db: [ pgsql, mysql ]
        method:
          - test_install_enable_disable_remove_store
          - test_install_enable_disable_remove_local
          - test_install_enable_disable_enable_disable_remove_store
          - test_install_enable_disable_enable_disable_remove_local
          - test_install_remove_local
          - test_install_remove_store
          - test_bundle_install_enable_disable_remove_store
          - test_bundle_install_update_enable_disable_remove_store
        include:
          - db: pgsql
            database_url: postgres://postgres:password@127.0.0.1:5432/eccube_db
            database_server_version: 14
            database_charset: utf8
          - db: mysql
            database_url: mysql://root:password@127.0.0.1:3306/eccube_db
            database_server_version: 5
            database_charset: utf8mb4

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      mailcatcher:
        image: schickling/mailcatcher
        ports:
          - 1080:1080
          - 1025:1025

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f  # v2
        with:
          php-version: ${{ matrix.php }}

      - name: Initialize Composer
        uses: ./.github/actions/composer

      - name: Setup to EC-CUBE
        env:
          APP_ENV: 'codeception'
          DATABASE_URL: ${{ matrix.database_url }}
          DATABASE_SERVER_VERSION: ${{ matrix.database_server_version }}
          DATABASE_CHARSET: ${{ matrix.database_charset }}
        run: |
          echo "APP_ENV=${APP_ENV}" > .env
          bin/console doctrine:database:create --env=dev
          bin/console doctrine:schema:create --env=dev
          bin/console eccube:fixtures:load --env=dev

      - name: Cache apt packages
        if: matrix.db == 'pgsql'
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05  # latest
        with:
          packages: postgresql-client
          version: 1.0

      - name: Update baseinfo with pgsql
        if: matrix.db == 'pgsql'
        env:
          PGPASSWORD: 'password'
        run: psql eccube_db -h 127.0.0.1 -U postgres -c "update dtb_base_info set authentication_key='test';"

      - name: Update baseinfo with mysql
        if: matrix.db == 'mysql'
        run: mysql -h 127.0.0.1 -u root -ppassword eccube_db -e "update dtb_base_info set authentication_key='test';"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20

      - name: Install Playwright dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Start PHP Development Server
        env:
          APP_ENV: 'codeception'
          DATABASE_URL: ${{ matrix.database_url }}
          DATABASE_SERVER_VERSION: ${{ matrix.database_server_version }}
          DATABASE_CHARSET: ${{ matrix.database_charset }}
          MAILER_URL: 'smtp://127.0.0.1:1025'
          ECCUBE_PACKAGE_API_URL: 'http://127.0.0.1:8080'
        run: php -S 127.0.0.1:8000 codeception/router.php &

      ## ${PWD}/repos does not exist so service cannot be started
      - name: Run package-api
        run: |
          if [[ ! -d ${PWD}/repos ]]; then mkdir -p ${PWD}/repos ; fi
          docker run -d --rm -v ${PWD}/repos:/repos -e MOCK_REPO_DIR=/repos -p 8080:8080 eccube/mock-package-api:composer2

      - name: Playwright
        working-directory: e2e
        run: npx playwright test plugin-install --grep "${METHOD}"
        env:
          DATABASE_URL: ${{ matrix.database_url }}
          BASE_URL: 'http://127.0.0.1:8000'
          ECCUBE_PROJECT_DIR: ${{ github.workspace }}
          ECCUBE_ADMIN_ROUTE: admin
          REPOS_DIR: ${{ github.workspace }}/repos
          PLUGIN_DATA_DIR: ${{ github.workspace }}/codeception/_data/plugins
          ECCUBE_PACKAGE_API_URL: 'http://127.0.0.1:8080'
          METHOD: ${{ matrix.method }}

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: plugin-install-${{ matrix.method }}-${{ matrix.db }}-traces
          path: e2e/test-results/
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: plugin-install-${{ matrix.method }}-${{ matrix.db }}-logs
