name: OWASP ZAP

# このGitHub Actionsワークフローは手動でトリガー可能です。
# 手動で実行するには、以下の手順に従ってください：
# 1. GitHubリポジトリの「Actions」タブに移動します。
# 2. 「OWASP ZAP」ワークフローを選択します。
# 3. 「Run workflow」ボタンをクリックします。
# 4. 必要に応じて、表示される入力フォームでパラメータを指定し、「Run workflow」を再度クリックして実行します。
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prune:
    name: Prune Docker images
    runs-on: ubuntu-24.04
    steps:
      - name: Prune Docker images
        run: docker image prune --force
        
  build:
    name: Build
    needs: prune
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Container Build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7
        with:
          context: .
          tags: ec-cube
          outputs: type=docker,dest=/tmp/ec-cube.tar

      # --- EC-CUBE イメージのアップロード ---
      - name: Upload image
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: ec-cube
          path: /tmp/ec-cube.tar

  scan:
    name: Scan
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - admin_authority
          - admin_class_category_csv
          - admin_class_name_csv
          - admin_content_block
          - admin_content_cache
          - admin_content_file
          - admin_content_layout
          - admin_customer_delivery
          - admin_customer_edit
          - admin_customer_list
          - admin_delivery
          - admin_js_css
          - admin_log
          - admin_login_history
          - admin_mail
          - admin_mail_edit
          - admin_masterdata
          - admin_member_edit
          - admin_member_setting
          - admin_news
          - admin_order_edit
          - admin_order_edit_search
          - admin_order_list
          - admin_order_mail
          - admin_page
          - admin_payment
          - admin_product_category
          - admin_product_class_name
          - admin_product_csv
          - admin_product_copy
          - admin_product_edit
          - admin_product_edit_class
          - admin_product_tag
          - admin_product_view
          - admin_shipping_csv
          - admin_shop_setting
          - admin_system
          - admin_tax
          - admin_template
          - entry
          - front_block
          - front_contact
          - front_help
          - front_mypage
          - front_new_item
          - front_product
          - front_sitemap
          - guest_cart
          - guest_front
          - guest_shopping
          - guest_shopping_customer_edit
          - guest_shopping_shipping_edit
          - guest_shopping_shipping_multiple
          - mypage_change
          - mypage_delivery
          - mypage_favorite
          - mypage_order
          - plugin_coupon_admin_coupon
          - plugin_coupon_guest_shopping
          - plugin_mailmagazine_send
          - plugin_mailmagazine_template
          - plugin_product_review
          - plugin_recommend
          - plugin_related_product
          - plugin_sales_report
        include:
          - target: admin_authority
            thread_per_host: 1
          - target: admin_customer_delivery
            before_script: admin_create_customer.zst
          - target: admin_content_cache
            thread_per_host: 1
          - target: admin_js_css
            thread_per_host: 1
          - target: admin_mail
            thread_per_host: 1
          - target: admin_masterdata
            thread_per_host: 1
          - target: admin_member_setting
            context: default
          - target: admin_order_edit_search
            before_script: admin_create_customers.zst
          - target: admin_shop_setting
            thread_per_host: 1
          - target: admin_system
            thread_per_host: 1
          - target: admin_template
            thread_per_host: 1
          - target: entry
            thread_per_host: 1
          - target: mypage_delivery
            before_script: admin_create_customer.zst
          - target: mypage_order
            before_script: admin_create_customer.zst
          - target: plugin_coupon_admin_coupon
            thread_per_host: 1
          - target: plugin_coupon_guest_shopping
            before_script: plugin_coupon_admin_create_coupon.zst
          - target: plugin_mailmagazine_send
            before_script: plugin_mailmagazine_create_customers.zst
          - target: plugin_related_product
            thread_per_host: 1

    steps:

      - name: Maximize build space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Download image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: ec-cube
          path: /tmp

      - name: Load image
        run: |
          docker load --input /tmp/ec-cube.tar
          docker tag ec-cube ghcr.io/ec-cube/ec-cube-php:8.1-apache

      - name: Run containers
        env:
          APP_ENV: prod
          APP_DEBUG: 0
        run: |
          docker compose -f docker-compose.yml -f docker-compose.pgsql.yml -f docker-compose.owaspzap.ci.yml up -d --wait
          docker compose cp zap/delete_data.sh postgres:/
          docker compose exec -d -e PGUSER=dbuser -e PGDATABASE=eccubedb postgres /delete_data.sh
          docker compose cp zap/delete_files.sh ec-cube:/
          docker compose exec -d ec-cube /delete_files.sh

      - name: Show ec-cube logs on failure
        if: failure()
        run: |
            docker compose -f docker-compose.yml -f docker-compose.pgsql.yml -f docker-compose.owaspzap.ci.yml logs ec-cube --tail=200
  
      - name: Set up plugins
        env:
            APP_ENV: prod
            APP_DEBUG: 0
        run: |
          for code in Api42 Coupon42 MailMagazine42 ProductReview42 Recommend42 RelatedProduct42 SalesReport42 Securitychecker42
          do
              docker compose exec -u www-data:www-data ec-cube bin/console eccube:composer:require "ec-cube/${code,,}"
              docker compose exec -u www-data:www-data ec-cube bin/console eccube:plugin:enable --code ${code}
          done

      - name: Disable rate limiter
        run: |
          docker compose exec -u www-data:www-data ec-cube sed -i -e "s/eccube_login_throttling_max_attempts: 5/eccube_login_throttling_max_attempts: 1024/" -e "s/eccube_login_throttling_interval: '30 minutes'/eccube_login_throttling_interval: '1 minutes'/" app/config/eccube/packages/eccube.yaml
          docker compose exec -u www-data:www-data ec-cube rm -f app/config/eccube/packages/prod/eccube_rate_limiter.yaml
          docker compose exec -u www-data:www-data ec-cube sed -i -e 's/30 min/1 min/g' app/config/eccube/packages/eccube_rate_limiter.yaml
          docker compose exec -u www-data:www-data ec-cube bin/console cache:clear
          docker compose exec -u www-data:www-data ec-cube bin/console debug:container --parameter eccube_login_throttling_max_attempts
          docker compose exec -u www-data:www-data ec-cube bin/console debug:container --parameter eccube_login_throttling_interval
          docker compose exec -u www-data:www-data ec-cube bin/console debug:config eccube

      - name: Generate automation config
        env:
          ZAP_CONTEXT: "${{ matrix.context }}"
          ZAP_THREAD_PER_HOST: "${{ matrix.thread_per_host }}"
          ZAP_BEFORE_SCRIPT: "${{ matrix.before_script }}"
        run: |
          set -eu

          BEFORE=""
          if [[ "${{ matrix.target }}" == admin_* ]]; then
            BEFORE="admin_login.zst"
          fi

          # 既存の include で before_script が指定されている場合はそれを優先したいなら下の行を有効化
          if [[ -n "${ZAP_BEFORE_SCRIPT:-}" ]]; then BEFORE="${ZAP_BEFORE_SCRIPT}"; fi

          zap/generate_automation_config.sh \
            -t ${{ matrix.target }} \
            ${BEFORE:+-b "${BEFORE}"} \
            ${ZAP_CONTEXT:+-c "${ZAP_CONTEXT}"} \
            ${ZAP_THREAD_PER_HOST:+-n "${ZAP_THREAD_PER_HOST}"}

          cat zap/automation/${{ matrix.target }}.yml

      - name: Patch automation config (run before_script)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, pathlib

          target = os.environ.get("TARGET")
          if not target:
            raise SystemExit("TARGET env is required")

          p = pathlib.Path(f"zap/automation/{target}.yml")
          y = p.read_text(encoding="utf-8")

          # before_script の add ブロックが無いターゲットは何もしない
          if "name: before_script" not in y:
            print("No before_script in this target. Skip patch.")
            raise SystemExit(0)

          # すでに run が入っている場合も何もしない
          if re.search(r"name:\s*before_script[\s\S]*?action:\s*run", y):
            print("before_script run already exists. Skip patch.")
            raise SystemExit(0)

          # before_script の add ブロック直後に run を差し込む
          # （template.ymlのインデントに合わせて jobs 配下は "  - type:" 形式）
          m = re.search(
            r"(\n  - type: script\n    parameters:\n"
            r"(?:      .+\n)*"
            r"      action: add\n"
            r"      type: sequence\n"
            r"      name: before_script\n"
            r"(?:      .+\n)*"
            r"      file: .+\n)",
            y
          )
          if not m:
            raise SystemExit("Could not find before_script add block to patch")

          insert = (
            "\n  - type: script\n"
            "    parameters:\n"
            "      action: run\n"
            "      type: sequence\n"
            "      name: before_script\n"
          )

          y2 = y[:m.end(1)] + insert + y[m.end(1):]
          p.write_text(y2, encoding="utf-8")
          print("Patched:", p)
          PY
        env:
          TARGET: ${{ matrix.target }}

      - name: Debug inspect zap container
        run: |
          docker compose exec -T zap whoami
          docker compose exec -T zap pwd
          docker compose exec -T zap ls -l /zap/wrk
          docker compose exec -T zap ls -l /home/zap/.ZAP || true

      - name: Update and Install Add-ons
        run: |
          docker compose exec -T zap /zap/zap.sh -cmd -addonupdate
          docker compose exec -T zap /zap/zap.sh -cmd -addonuninstall sequence
          docker compose exec -T zap /zap/zap.sh -cmd -addoninstall sequence
          docker compose exec -T zap /zap/zap.sh -cmd -addoninstall automation
          docker compose exec -T zap /zap/zap.sh -cmd -addoninstall groovy

      - name: Preprocess Zest scripts (replace customer-id token)
        run: |
          docker compose exec -T -u 0:0 zap sh -lc '
            set -eu
            echo "=== before replace (sample) ==="
            grep -R --line-number "{{customer-id}}" /zap/wrk/scripts 2>/dev/null | head -n 20 || true

            # 置換（rootで実行して権限問題を回避）
            find /zap/wrk/scripts -name "*.zst" -print0 \
              | xargs -0 sed -i "s/{{customer-id}}/1/g"

            echo "=== after replace (sample) ==="
            grep -R --line-number "{{customer-id}}" /zap/wrk/scripts 2>/dev/null | head -n 20 || true

            echo "=== perms (dir) ==="
            ls -ld /zap/wrk/scripts
          '

      - name: Autorun
        run: |
          set -x
          docker compose exec -T zap ls -la /zap/wrk/automation/${{ matrix.target }}.yml
          docker compose exec -T zap ls -la /zap/wrk/options.properties

          # ZAP実行
          docker compose exec -T zap /zap/zap.sh \
            -cmd \
            -config anticsrf.tokens.token.name=_csrf_token \
            -config anticsrf.tokens.token.enabled=true \
            -configfile /zap/wrk/options.properties \
            -autorun /zap/wrk/automation/${{ matrix.target }}.yml

      - name: Debug app logs after autorun
        if: ${{ always() }}
        run: |
          echo "=== Docker Compose Logs (ec-cube) ==="
          docker compose -f docker-compose.yml -f docker-compose.pgsql.yml -f docker-compose.owaspzap.ci.yml logs ec-cube --tail=300 || true

          echo "=== Symfony prod log (directory and files) ==="
          docker compose exec -T ec-cube sh -lc 'ls -la var/log var/log/prod 2>/dev/null || true'

          echo "=== EC-CUBE site.log (last 300 lines) ==="
          docker compose exec -T ec-cube sh -lc 'tail -n 300 var/log/prod/site.log 2>/dev/null || true'

          echo "=== EC-CUBE admin.log (last 300 lines) ==="
          docker compose exec -T ec-cube sh -lc 'tail -n 300 var/log/prod/admin.log 2>/dev/null || true'

          echo "=== Apache error log (if exists) ==="
          docker compose exec -T ec-cube sh -lc 'tail -n 200 /var/log/apache2/error.log 2>/dev/null || true'

          echo "=== PHP error log (if exists) ==="
          docker compose exec -T ec-cube sh -lc 'tail -n 200 /var/log/php*/error.log 2>/dev/null || true'
          
      - name: Copy report
        if: ${{ always() }}
        run: |
          docker compose cp zap:/tmp/report /tmp
          docker compose cp zap:/tmp/alerts.json /tmp

      - name: Upload report
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: zap-${{ matrix.target }}-report
          path: /tmp/report
          overwrite: true

      - name: Upload alerts
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: zap-${{ matrix.target }}-alerts
          path: /tmp/alerts.json
          overwrite: true

  merge:
    name: Merge alerts
    needs: scan
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: artifacts
          pattern: zap-*-alerts
      - name: Merge alerts
        working-directory: artifacts
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find . -type f -name 'alerts.json' -print0)

          if (( ${#files[@]} == 0 )); then
            echo "No alerts.json found under artifacts/" >&2
            find .
            exit 1
          fi

          jq -s 'add // []' "${files[@]}" > all_alerts.json
      - name: Upload alerts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: all_alerts
          path: artifacts/all_alerts.json