version: "3"

# ローカルで開発したプラグイン・テンプレートをDockerに自動反映するための設定です。
#
# 使い方:
# docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.sync.yml up -d

services:
  ec-cube:
    environment:
      # 使用するテンプレートコードを指定します。
      # 変更後は docker compose restart が必要です。
      ECCUBE_TEMPLATE_CODE: "${ECCUBE_TEMPLATE_CODE:-default}"
    volumes:
      # プラグイン開発用
      - "./app/Plugin:/var/www/html/app/Plugin"
      - "./html/plugin:/var/www/html/html/plugin"
      # テンプレート開発用
      - "./app/template:/var/www/html/app/template"
      - "./html/template:/var/www/html/html/template"
      - "./html/user_data:/var/www/html/html/user_data"
