services:
  zap:
    image: ghcr.io/ec-cube/zaproxy:0.1.2
    
    # コンテナを待機させる
    entrypoint: ["sh", "-c"]
    command: ["tail -f /dev/null"]
    
    environment:
      # HOMEは公式が /home/zap を前提にしているため明示しておくと安全
      HOME: /home/zap

    volumes:
      - ./zap:/zap/wrk/
      - ./zap/policies:/zap/policies:ro
    depends_on:
      - ec-cube
    networks:
      - backend
      - default
    tty: true
    healthcheck:
      test: echo 'zap'
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s